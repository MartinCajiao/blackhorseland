name: Deploy Astro to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Le decimos que entre a la carpeta antes de instalar
        run: npm install
        working-directory: ./blackhorse-landing

      - name: Build with Astro
        # Le decimos que entre a la carpeta antes de compilar
        run: npm run build
        working-directory: ./blackhorse-landing

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Subimos la carpeta dist que está dentro de blackhorse-landing
          path: ./blackhorse-landing/dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
